services:
  desktop:
    build:
      context: .
    init: true
    restart: unless-stopped
    shm_size: "1gb"
    stop_grace_period: 20s
    ports:
      - "127.0.0.1:${COMPUTER_LIVE_VIEW_PORT:-6901}:6901"
    environment:
      DISPLAY: ":1"
      COMPUTER_DISPLAY_HEIGHT: "${COMPUTER_DISPLAY_HEIGHT:-800}"
      COMPUTER_DISPLAY_WIDTH: "${COMPUTER_DISPLAY_WIDTH:-1280}"
      VNC_PW: "${COMPUTER_DESKTOP_PASSWORD:?set COMPUTER_DESKTOP_PASSWORD in your local environment}"
      VNC_RESOLUTION: "${COMPUTER_DISPLAY_WIDTH:-1280}x${COMPUTER_DISPLAY_HEIGHT:-800}"
      VNC_COL_DEPTH: "24"
      MAX_FRAME_RATE: "30"
      START_PULSEAUDIO: "1"
      KASM_SVC_AUDIO: "0"
    volumes:
      - ./workspace:/workspace
      - ./artifacts:/artifacts
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 1024
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          xdpyinfo -display :1 >/dev/null 2>&1
          && pgrep -x xfce4-session >/dev/null
          && /opt/computer-agent/bin/screenshot /tmp/health.png
      start_period: 45s
      interval: 15s
      timeout: 5s
      retries: 3
